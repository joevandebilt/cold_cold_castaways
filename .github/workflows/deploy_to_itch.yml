name: Deploy to Itch.io

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Export Godot project (Web)
        id: export
        uses: firebelley/godot-export@v5.2.1
        with:
          godot_executable_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_linux.x86_64.zip"
          godot_export_templates_download_url: "https://github.com/godotengine/godot/releases/download/4.3-stable/Godot_v4.3-stable_export_templates.tpz"
          relative_project_path: ./
          archive_output: true
          verbose: true
          presets_to_export: "web"

      - name: Upload to Itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: html5
          ITCH_GAME: cold-cold-castaways       # ← your game's URL slug on Itch
          ITCH_USER: joeborder   # ← your Itch.io username
          PACKAGE: ${{ steps.export.outputs.archive_directory }}/*.zip
